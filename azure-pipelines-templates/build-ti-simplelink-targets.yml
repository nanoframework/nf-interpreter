parameters:
  - name: repoDirectory
    type: string
    default: $(Build.SourcesDirectory)

steps:
  - template: setup-cmake-user-presets.yml
    parameters:
      repoDirectory: ${{ parameters.repoDirectory }}

  - bash: |
      # TI XDC Tools Linux release. Version index: https://software-dl.ti.com/dsps/dsps_public_sw/sdo_sb/targetcontent/rtsc/index.html
      # Note: 3.62.01.15 has no Linux release; 3.62.00.08 is the latest available (also used in the dev container).
      TI_XDCTOOLS_VERSION="3_62_00_08"
      TI_XDCTOOLS_URL="https://software-dl.ti.com/dsps/dsps_public_sw/sdo_sb/targetcontent/rtsc/${TI_XDCTOOLS_VERSION}/exports/xdccore/xdctools_${TI_XDCTOOLS_VERSION}_core_linux.zip"
      curl -fL "$TI_XDCTOOLS_URL" -o /tmp/ti_xdctools.zip
      mkdir -p /tmp/ti_xdctools
      unzip -q /tmp/ti_xdctools.zip -d /tmp/ti_xdctools
      chmod +x /tmp/ti_xdctools/xdctools_${TI_XDCTOOLS_VERSION}_core/xs
      echo "##vso[task.prependpath]/tmp/ti_xdctools/xdctools_${TI_XDCTOOLS_VERSION}_core"
    displayName: Download TI XDC Tools for Linux

  - task: CMake@1
    inputs:
      cmakeArgs: " --preset $(TargetBoard) -DCMAKE_BUILD_TYPE=MinSizeRel -DBUILD_VERSION=$(NBGV_VersionMajor).$(NBGV_VersionMinor).$(NBGV_BuildNumber).$(TARGET_BUILD_COUNTER) -DTARGET_BOARD=$(TargetBoard) -DTARGET_NAME=$(TargetPublishName) $(BuildOptions)"
      workingDirectory: ${{ parameters.repoDirectory }}
    displayName: Setup build with CMake

  - task: CMake@1
    inputs:
      cmakeArgs: "--build --preset $(TargetBoard) --target all --config MinSizeRel"
      workingDirectory: ${{ parameters.repoDirectory }}
    displayName: Build with CMake
