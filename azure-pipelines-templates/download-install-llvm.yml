steps:
  - task: Cache@2
    condition: ne(variables['System.PullRequest.PullRequestId'], '')
    displayName: Cache LLVM
    inputs:
      key: "llvm_18_1_7_linux | llvmUpdateKey"
      restoreKeys: llvm_
      path: $(Agent.TempDirectory)/llvm
      cacheHitVar: LLVM_CACHE_RESTORED

  - bash: |
      mkdir -p $(Agent.TempDirectory)/llvm/bin
      wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
      echo "deb [signed-by=/etc/apt/trusted.gpg.d/apt.llvm.org.asc] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list > /dev/null
      sudo apt-get update -qq
      sudo apt-get install -y clang-format-18
      cp /usr/bin/clang-format-18 "$(Agent.TempDirectory)/llvm/bin/clang-format"
      chmod +x "$(Agent.TempDirectory)/llvm/bin/clang-format"
    displayName: Install clang-format
    condition: >-
      and(
        ne(variables['System.PullRequest.PullRequestId'], ''),
        ne(variables.LLVM_CACHE_RESTORED, 'true')
      )

  - script: |
      echo ##vso[task.prependpath]$(Agent.TempDirectory)/llvm/bin
    displayName: Add LLVM to PATH
    condition: ne(variables['System.PullRequest.PullRequestId'], '')
