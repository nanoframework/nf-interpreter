parameters:
  - name: gccArmVersion
    type: string
    default: "15.2.rel1"

steps:
  - task: Cache@2
    condition: eq(variables.GccArm_Version, '')
    displayName: Cache ARM GCC toolchain
    inputs:
      key: "gcc-${{ replace(parameters.gccArmVersion, '.', '_') }}-linux | gccUpdateKey"
      restoreKeys: "gcc-${{ replace(parameters.gccArmVersion, '.', '_') }}-linux"
      path: $(Agent.TempDirectory)/arm-gnu-toolchain-${{ parameters.gccArmVersion }}-x86_64-arm-none-eabi
      cacheHitVar: GCC_CACHE_RESTORED

  - bash: |
      curl -fL --no-progress-meter \
        "https://developer.arm.com/-/media/Files/downloads/gnu/${{ parameters.gccArmVersion }}/binrel/arm-gnu-toolchain-${{ parameters.gccArmVersion }}-x86_64-arm-none-eabi.tar.xz" \
        -o "$(Agent.TempDirectory)/arm-gcc.tar.xz"
      tar -xf "$(Agent.TempDirectory)/arm-gcc.tar.xz" -C "$(Agent.TempDirectory)/"
    displayName: Download ARM GCC toolchain
    condition: and( eq(variables.GccArm_Version, ''), ne(variables.GCC_CACHE_RESTORED, 'true'))
    failOnStderr: true

  - bash: |
      GCC_BIN=$(dirname "$(find "$(Agent.TempDirectory)/arm-gnu-toolchain-${{ parameters.gccArmVersion }}-x86_64-arm-none-eabi" -name "arm-none-eabi-gcc" -type f | head -1)")
      if [ -z "$GCC_BIN" ] || [ ! -f "$GCC_BIN/arm-none-eabi-gcc" ]; then
        echo "ERROR: arm-none-eabi-gcc not found in toolchain directory"
        exit 1
      fi
      echo "Adding ARM GCC toolchain to PATH: $GCC_BIN"
      echo "##vso[task.setvariable variable=ARM_GCC_PATH]$GCC_BIN"
      echo "##vso[task.prependpath]$GCC_BIN"
    displayName: Add GCC to PATH
    failOnStderr: true
