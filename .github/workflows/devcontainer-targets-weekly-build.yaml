name: Weekly [devcontainer] target builds

on:
  pull_request:
    paths:
      - '.github/workflows/devcontainer-targets-weekly-build.yaml'
  schedule:
    - cron: '20 3 * * 0' # Runs at 03:20 UTC on sunday every week


jobs:
  build-target:
    strategy:
      fail-fast: false # Continues to build other targets in the matrix, even if one fails.

      matrix: # Add the target and build type you wish to generate firmware for:
        include: [
          { target: SL_STK3701A,             build-type: MinSizeRel, container: AzureRTOS},
          { target: SL_STK3701A_REVB,        build-type: MinSizeRel, container: AzureRTOS},
          { target: MXCHIP_AZ3166,           build-type: MinSizeRel, container: ChibiOS },
          { target: ST_STM32F429I_DISCOVERY, build-type: MinSizeRel, container: ChibiOS },
          { target: ST_STM32F769I_DISCOVERY, build-type: MinSizeRel, container: ChibiOS },
          { target: ORGPAL_PALTHREE,         build-type: MinSizeRel, container: ChibiOS },
          { target: ORGPAL_PALX,             build-type: MinSizeRel, container: ChibiOS },
          { target: ST_NUCLEO64_F091RC,      build-type: MinSizeRel, container: ChibiOS },
          { target: ESP_WROVER_KIT,          build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_BLE_REV0,          build-type: MinSizeRel,  container: ESP32 },
          { target: ESP32_C3,                build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_C6_THREAD,         build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_ETHERNET_KIT_1.2,  build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_H2_THREAD,         build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_P4_UART,           build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_PSRAM_REV0,        build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_S2_USB,            build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_S3,                build-type: MinSizeRel, container: ESP32 },
          { target: ESP32_S3_ALL,            build-type: MinSizeRel, container: ESP32 },
          { target: M5Core2,                 build-type: MinSizeRel, container: ESP32 },
          { target: NXP_MIMXRT1060_EVK,      build-type: MinSizeRel, container: FreeRTOS-NXP },
          { target: TI_CC1352R1_LAUNCHXL,    build-type: MinSizeRel, container: TI, radio-freq: 868 },
          { target: TI_CC1352R1_LAUNCHXL,    build-type: MinSizeRel, container: TI, radio-freq: 915 },
        ]

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          # this might remove tools that are actually needed,
          # when set to "true" but frees about 6 GB
          tool-cache: true
          large-packages: false

      - name: Adjust config templates for a devcontainer
        run: |
          # Move into the config directory
          pushd config

          # Rename the templates
          mv user-prefs.TEMPLATE.json user-prefs.json
          mv user-tools-repos.TEMPLATE.json user-tools-repos.json

          # Adjust the file content for a valid radio frequency (TI targets)
          if [[ -n "${{ matrix.radio-freq }}" ]]; then
            sed -i -- 's|"RADIO_FREQUENCY": "CHANGE_ME_TO_A_VALID_VALUE_868_OR_915"|"RADIO_FREQUENCY": "${{ matrix.radio-freq }}"|g' user-prefs.json
          fi

          # Adjust the file content for a devcontainer
          sed -i -- 's|"name": "user-tools-repos-container"|"name": "user-tools-repos"|g' user-tools-repos.json

          # Move out of the config directory
          popd

      - name: Adjust devcontainer.json for ${{ matrix.container }} source
        run: |
          # Move into the .devcontainer directory
          pushd .devcontainer/${{ matrix.container }}

          # Target the dockerfile source.
          sed -i -- 's|"dockerFile": "Dockerfile.${{ matrix.container }}"|"dockerFile": "Dockerfile.${{ matrix.container }}.SRC"|g' devcontainer.json

          # Move out of the .devcontainer directory
          popd

      - name: Build ${{ matrix.target }} ${{ matrix.build-type }} Firmware
        uses: devcontainers/ci@v0.3
        with:
          configFile: ./.devcontainer/${{ matrix.container }}/devcontainer.json
          push: never
          runCmd: |
            # Build target:
            cmake --preset=${{ matrix.target }} -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
            cmake --build build
