            eq(variables['BUILD_WINDOWS_NANOCLR__'], 'true')
          )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style

    pool:
      vmImage: "windows-2022"

    variables:
      - name: DOTNET_NOLOGO
        value: true
      # creates a counter and assigns it to the revision variable
      - name: REVISION
        value: $[counter('WIN_ARM64_1_17_0_versioncounter', 0)]
      - name: LITTLEFS_PATH
        value: "D:/a/1/s/littlefs"

    steps:
      - checkout: self
      - checkout: littlefs
        fetchDepth: 1

      - template: azure-pipelines-templates/nb-gitversioning.yml
        parameters:
          repoDirectory: '$(Build.SourcesDirectory)/nf-interpreter'

      - task: PowerShell@2
        displayName: Store CLR DLL revision
        name: SetRevision
        inputs:
          targetType: "inline"
          script: |
            Write-Host "$("##vso[task.setvariable variable=CLR_REVISION;isOutput=true]")$(REVISION)"

      - task: PowerShell@2
        displayName: Store package version
        inputs:
          targetType: "inline"
          script: |
            Write-Host "$("##vso[task.setvariable variable=WINCLR_PACKAGE_VERSION]")$(NBGV_VersionMajor).$(NBGV_VersionMinor).$(NBGV_BuildNumber).$(TARGET_BUILD_COUNTER)"
            Write-Host "$("##vso[task.setvariable variable=WINCLR_AssemblyInformationalVersion]")$(NBGV_VersionMajor).$(NBGV_VersionMinor).$(NBGV_BuildNumber).$(TARGET_BUILD_COUNTER)$(NBGV_BuildMetadataFragment)"

      - template: azure-pipelines-templates/install-nuget.yml@templates

      - task: Cache@2
        displayName: Cache NuGet packages
        continueOnError: true
        inputs:
          key: 'nuget | **/targets/netcore/nanoFramework.nanoCLR.Host/packages.lock.json | **/targets/netcore/nanoFramework.nanoCLR.CLI/packages.lock.json'
          path: $(UserProfile)/.nuget/packages

      - task: DotNetCoreCLI@2
        displayName: Restore NuGet packages
        inputs:
          command: restore
          restoreArguments: "--locked-mode"
          verbosityRestore: minimal
          projects: nf-interpreter/targets/netcore/nanoCLR.sln
          feedsToUse: select
          includeNuGetOrg: true

      - task: VSBuild@1
        displayName: Build WIN ARM64 DLL target
        inputs:
          solution: "nf-interpreter/targets/netcore/nanoCLR.sln"
          vsVersion: "17.0"
          msbuildArchitecture: "x64"
          platform: "ARM64"
          maximumCpuCount: true
          msbuildArgs: "/restore /p:PublicRelease=true /p:BuildWithNetFrameworkHostedCompiler=true"
          configuration: "Release"

      - pwsh: |
          $ErrorActionPreference = "Stop"

          Write-Host "Agent OS: $env:Agent_OS"
          Write-Host "PROCESSOR_ARCHITECTURE: $env:PROCESSOR_ARCHITECTURE"
          Write-Host "Build.SourcesDirectory: $(Build.SourcesDirectory)"
          Write-Host "LITTLEFS_PATH: $(LITTLEFS_PATH)"

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found."
          }

          $vsPath = & $vswhere `
            -latest `
            -version "[17.0,18.0)" `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 `
            -property installationPath

          if (-not $vsPath) {
            throw "Visual Studio 2022 with ARM64 C++ tools was not found."
          }

          Write-Host "Visual Studio path: $vsPath"

          $dumpbin = Get-ChildItem `
            "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" `
            -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $dumpbin) {
            throw "dumpbin.exe was not found."
          }

          Write-Host "dumpbin path: $($dumpbin.FullName)"

          $repoRootCandidates = @(
            "$(Build.SourcesDirectory)",
            (Join-Path "$(Build.SourcesDirectory)" "nf-interpreter")
          )

          $repoRoot = $repoRootCandidates |
            Where-Object { Test-Path (Join-Path $_ "targets\netcore\nanoCLR.sln") } |
            Select-Object -First 1

          if (-not $repoRoot) {
            throw "Could not resolve repository root from Build.SourcesDirectory."
          }

          $solutionPath = Join-Path $repoRoot "targets\netcore\nanoCLR.sln"
          $binDir = Join-Path $repoRoot "build\bin\Release"

          Write-Host "Resolved repository root: $repoRoot"
          Write-Host "Solution path: $solutionPath"
          Write-Host "Configuration: Release"
          Write-Host "Platform: ARM64"
          Write-Host "Output path: $binDir"

          $targets = @(
            (Join-Path $binDir "Core.lib"),
            (Join-Path $binDir "nanoFramework.nanoCLR.dll")
          )

          foreach ($target in $targets) {
            if (-not (Test-Path $target)) {
              throw "Expected build artifact was not found: $target"
            }

            Write-Host "Verifying architecture: $target"

            $headers = & $dumpbin.FullName /headers $target 2>&1
            $machineLines = $headers | Select-String "machine"

            $machineLines | ForEach-Object {
              Write-Host $_
            }

            if (($headers -join "`n") -notmatch "AA64 machine \(ARM64\)") {
              throw "Expected an ARM64 artifact: $target"
            }
          }
        displayName: Verify ARM64 build artifacts

      - task: CopyFiles@2
        condition: succeeded()
        displayName: Stage win-arm64 nanoCLR runtime artifact
        inputs:
          SourceFolder: "$(Build.SourcesDirectory)/nf-interpreter/build/bin/Release"
          Contents: |
            nanoFramework.nanoCLR.dll
            nanoFramework.nanoCLR.pdb
            Core.lib
            Debugger.lib
            Diagnostics.lib
            Messaging.lib
            WireProtocol.lib
          TargetFolder: "$(Build.ArtifactStagingDirectory)/runtimes/win-arm64/native"
          flattenFolders: true
          ignoreMakeDirErrors: true

      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish win-arm64 nanoCLR runtime artifact
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)"
          artifactName: nanoclr_win_arm64
          artifactType: pipeline

  #################
  # POSIX host target (macOS + Linux)
  - job: Build_POSIX_nanoCLR
    strategy:
      matrix:
        macOS_arm64:
          vmImage: 'macos-14'
          POSIX_RID: osx-arm64
        macOS_x64:
          vmImage: 'macOS-latest'
          POSIX_RID: osx-x64
        Linux_x64:
          vmImage: 'ubuntu-22.04'
          POSIX_RID: linux-x64
        Linux_arm64:
          vmImage: 'ubuntu-22.04'
          POSIX_RID: linux-arm64
      maxParallel: 4
    condition: >-
      or(
        and(
          succeeded('Check_Code_Style'),
          ne( dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true ),
          or(
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_POSIX'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_NANOCLR_CLI'], true)
          )
        ),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq(variables['BUILD_ALL__'], 'true'),
            eq(variables['BUILD_POSIX__'], 'true'),
            eq(variables['BUILD_NANOCLR_CLI__'], 'true')
          )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style

    pool:
      vmImage: $(vmImage)

    variables:
      - name: REVISION
        value: $[counter('POSIX_1_17_0_versioncounter', 0)]

    steps:
      - checkout: self

      - task: UseDotNet@2
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Darwin'))
        displayName: Install .NET SDK for NBGV
        inputs:
          packageType: sdk
          version: 8.0.x

      - task: DotNetCoreCLI@2
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Darwin'))
        displayName: Install NBGV tool
        inputs:
          command: custom
          custom: tool
          arguments: install nbgv -g

      - template: azure-pipelines-templates/nb-gitversioning.yml

      - bash: |
          set -euo pipefail

          # Derive cmake arch and library extension from the POSIX_RID matrix variable.
          case "$(POSIX_RID)" in
            osx-arm64|linux-arm64) NANO_ARCH=arm64  ; LIB_EXT=dylib ;;
            osx-x64)               NANO_ARCH=x86_64 ; LIB_EXT=dylib ;;
            linux-x64)             NANO_ARCH=x86_64 ; LIB_EXT=so    ;;
          esac
          # Correct extension for Linux regardless of arch.
          [[ "$(POSIX_RID)" == linux-* ]] && LIB_EXT=so

          # Install ninja if not present (Linux agents).
          if ! command -v ninja >/dev/null 2>&1; then
            sudo apt-get install -y ninja-build
          fi

          # Install arm64 cross-compiler when building linux-arm64 on an x86_64 agent.
          TOOLCHAIN_ARG=""
          if [ "$(POSIX_RID)" = "linux-arm64" ]; then
            curl -fsSL "https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz" \
              | sudo tar -xJ -C /opt
            export PATH="/opt/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-linux-gnu/bin:$PATH"
            TOOLCHAIN_ARG="-DCMAKE_TOOLCHAIN_FILE=$(pwd)/targets/posix/toolchain-aarch64-linux-gnu.cmake"
          fi

          echo "RID=$(POSIX_RID)  ARCH=${NANO_ARCH}  LIB_EXT=${LIB_EXT}"

          cmake -S targets/posix -B build/posix -G Ninja \
            -DBUILD_VERSION=$(NBGV_VersionMajor).$(NBGV_VersionMinor).$(NBGV_BuildNumber).$(TARGET_BUILD_COUNTER) \
            -DNANO_POSIX_ARCH=${NANO_ARCH} \
            -DNANO_POSIX_ENABLE_SMOKE=ON \
            ${TOOLCHAIN_ARG}
          cmake --build build/posix
          # Smoke-run the test binary only when its architecture matches the runner.
          # For cross-compiled builds (e.g. osx-x64 on an arm64 agent) we skip the run
          # but the library artifact is still staged and published.
          case "$(uname -m)" in
            arm64|aarch64) HOST_CANONICAL=arm64  ;;
            x86_64)        HOST_CANONICAL=x86_64 ;;
            *)             HOST_CANONICAL="$(uname -m)" ;;
          esac
          if [ "${HOST_CANONICAL}" = "${NANO_ARCH}" ]; then
            ./build/posix/bin/nanoFramework.nanoCLR.test | tee build/posix/smoke.log
            if ! grep -Eq '[0-9]+\.[0-9]+\.[0-9]+' build/posix/smoke.log; then
              echo "ERROR: smoke output validation failed, expected semantic version in output."
              exit 1
            fi
            CLR_VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' build/posix/smoke.log | head -1)
          else
            echo "Skipping smoke run: host=$(uname -m) (${HOST_CANONICAL}), target=${NANO_ARCH} (cross-compiled binary)."
            CLR_VERSION="0.0.0.0"
          fi
          echo "Detected CLR version: ${CLR_VERSION}"
          echo "##vso[task.setvariable variable=POSIX_CLR_VERSION]${CLR_VERSION}"
          echo "##vso[task.setvariable variable=POSIX_LIB_EXT]${LIB_EXT}"

          # Stage under runtimes/{rid}/native/ so the CLI pack job can collect all RIDs.
          STAGING="$(Build.ArtifactStagingDirectory)/runtimes/$(POSIX_RID)/native"
          mkdir -p "${STAGING}"
          cp "build/posix/lib/nanoFramework.nanoCLR.${LIB_EXT}" "${STAGING}/"
        displayName: Build and smoke run POSIX nanoCLR

      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish POSIX nanoCLR artifact
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)"
          artifactName: nanoclr_posix_$(POSIX_RID)
          artifactType: pipeline

  #################
  # nanoCLR CLI tool
  - job: Build_nanoCLR_CLI
    condition: >-
      or(
        and(
          succeeded('Check_Code_Style'),
          ne(dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true),
          or(
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_NANOCLR_CLI'], true)
          )
        ),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq(variables['BUILD_ALL__'], 'true'),
            eq(variables['BUILD_NANOCLR_CLI__'], 'true')
          )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style
      - Build_WIN32_nanoCLR
      - Build_WIN_ARM64_nanoCLR
      - Build_POSIX_nanoCLR

    pool:
      vmImage: "windows-latest"

    variables:
      - name: DOTNET_NOLOGO
        value: true
      - name: LITTLEFS_PATH
        value: "D:/a/1/s/littlefs"
      - name: REVISION
        value: $[dependencies.Build_WIN32_nanoCLR.outputs['SetRevision.CLR_REVISION']]

    steps:
      - checkout: self
      - checkout: littlefs
        fetchDepth: 1

      - template: azure-pipelines-templates/nb-gitversioning.yml
        parameters:
          repoDirectory: '$(Build.SourcesDirectory)/nf-interpreter'

      - template: azure-pipelines-templates/install-nuget.yml@templates

      - task: Cache@2
        displayName: Cache NuGet packages
        continueOnError: true
        inputs:
          key: 'nuget | **/targets/netcore/nanoFramework.nanoCLR.Host/packages.lock.json | **/targets/netcore/nanoFramework.nanoCLR.CLI/packages.lock.json'
          path: $(UserProfile)/.nuget/packages

      - task: DotNetCoreCLI@2
        displayName: Restore NuGet packages
        inputs:
          command: restore
          restoreArguments: "--locked-mode"
          verbosityRestore: minimal
          projects: "nf-interpreter/targets/netcore/nanoCLR.sln"
          feedsToUse: select
          includeNuGetOrg: true

      - task: VSBuild@1
        displayName: Build .NET tool
        condition: succeeded()
        inputs:
          solution: "nf-interpreter/targets/netcore/nanoCLR.sln"
          platform: "Any CPU"
          maximumCpuCount: true
          msbuildArgs: "/restore /p:PublicRelease=true /p:BuildWithNetFrameworkHostedCompiler=true"
          configuration: "Release"

      - task: DownloadPipelineArtifact@2
        displayName: 'Download POSIX artifact: osx-arm64'
        continueOnError: true
        inputs:
          artifact: nanoclr_posix_osx-arm64
          path: "$(Build.SourcesDirectory)/native-libs"

      - task: DownloadPipelineArtifact@2
        displayName: 'Download POSIX artifact: osx-x64'
        continueOnError: true
        inputs:
          artifact: nanoclr_posix_osx-x64
          path: "$(Build.SourcesDirectory)/native-libs"

      - task: DownloadPipelineArtifact@2
        displayName: 'Download POSIX artifact: linux-x64'
        continueOnError: true
        inputs:
          artifact: nanoclr_posix_linux-x64
          path: "$(Build.SourcesDirectory)/native-libs"

      - task: DownloadPipelineArtifact@2
        displayName: 'Download POSIX artifact: linux-arm64'
        continueOnError: true
        inputs:
          artifact: nanoclr_posix_linux-arm64
          path: "$(Build.SourcesDirectory)/native-libs"

      - task: DownloadPipelineArtifact@2
        displayName: 'Download Windows artifact: win-x64'
        continueOnError: true
        inputs:
          artifact: nanoclr_win_x64
          path: "$(Build.SourcesDirectory)/native-libs"

      - task: DownloadPipelineArtifact@2
        displayName: 'Download Windows artifact: win-arm64'
        continueOnError: true
        inputs:
          artifact: nanoclr_win_arm64
          path: "$(Build.SourcesDirectory)/native-libs"

      - task: MSBuild@1
        condition: succeeded()
        displayName: Pack nanoCLR CLI
        inputs:
          solution: "nf-interpreter/targets/netcore/nanoFramework.nanoCLR.CLI/nanoFramework.nanoCLR.CLI.csproj"
          platform: "Any CPU"
          msbuildArguments: "/p:PublicRelease=true /t:pack /p:PackageOutputPath=$(Build.ArtifactStagingDirectory) /p:NativeBinRoot=$(Build.SourcesDirectory)/native-libs/"
          configuration: "Release"
          maximumCpuCount: true

      - task: CopyFiles@2
        condition: succeeded()
        displayName: Add CLI build output to validation artifacts
        inputs:
          SourceFolder: "nf-interpreter/build/bin/Release/net8.0"
          Contents: "**/*"
          TargetFolder: "$(Build.ArtifactStagingDirectory)/cli-output"
          ignoreMakeDirErrors: true

      - task: CopyFiles@2
        condition: succeeded()
        displayName: Add staged native runtime assets to validation artifacts
        inputs:
          SourceFolder: "$(Build.SourcesDirectory)/native-libs"
          Contents: "**/*"
          TargetFolder: "$(Build.ArtifactStagingDirectory)/staged-runtimes"
          ignoreMakeDirErrors: true
      - task: CopyFiles@2
        condition: succeeded()
        displayName: Copy nanoclr
        inputs:
          SourceFolder: "nf-interpreter/build/bin/Release"
          Contents: "nanoFramework.nanoCLR.dll"
          TargetFolder: "$(Build.ArtifactStagingDirectory)/nanoclr"

      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish nanoclr NuGet package
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)"
          artifactName: nanoclr_nuget
          artifactType: pipeline

      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish nanoclr
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)/nanoclr"
          artifactName: nanoclr_cli
          artifactType: pipeline

      # push NuGet packages to NuGet (always happens when building from main, except on PR builds)
  #########################
  # Run mscorlib Unit Tests

  - job: Run_UnitTests_mscorlib
    condition: >-
      or(
        and(
          succeeded('Build_nanoCLR_CLI'),
          ne(dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true),
          ne(variables['System.PullRequest.PullRequestId'], ''),
          or(
            eq(dependencies.Check_Build_Options.outputs['BuildOptions.RUN_MSCORLIB_TESTS'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_NANOCLR_CLI'], true)
          )
        ),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq(variables['BUILD_ALL__'], 'true'),
            eq(variables['BUILD_NANOCLR_CLI__'], 'true')
          ),
          eq(variables['RUN_MSCORLIB_TESTS__'], 'true')
        )
      )

    dependsOn:
      - Build_nanoCLR_CLI

    pool:
      vmImage: "windows-latest"

    variables:
      DOTNET_NOLOGO: true
      solution: "nanoFramework.CoreLibrary.sln"
      buildPlatform: "Any CPU"
      buildConfiguration: "Release"

    steps:
      - checkout: self
        fetchDepth: 1
      - checkout: mscorlib
        fetchDepth: 100
        submodules: true
        persistCredentials: true

      - template: azure-pipelines-templates/check-mscorlib-to-test.yml

      # Download nanoclr from build artifacts
      - task: DownloadPipelineArtifact@2
        inputs:
          artifact: nanoclr_cli
          path: "$(Agent.TempDirectory)/nanoclr_cli"

      # build mscorlib

      - task: InstallNanoMSBuildComponents@1
        condition: succeeded()
        displayName: Install .NET nanoFramework MSBuild components

      - template: azure-pipelines-templates/install-nuget.yml@templates

      - task: Cache@2
        displayName: Cache NuGet packages
        condition: succeeded()
        continueOnError: true
        inputs:
          key: 'nuget | **/packages.lock.json'
          path: $(UserProfile)/.nuget/packages

      - task: NuGetCommand@2
        condition: succeeded()
        displayName: NuGet restore
        retryCountOnTaskFailure: 5
        inputs:
          restoreSolution: "**/nanoFramework.CoreLibrary.sln"
          feedsToUse: select

      - task: VSBuild@1
        condition: succeeded()
        inputs:
          solution: "**/nanoFramework.CoreLibrary.sln"
          platform: "Any CPU"
          msbuildArgs: "/p:PublicRelease=true"
          configuration: "Release"
          msbuildArchitecture: "x64"
          maximumCpuCount: true

      # run tests
      - template: azure-pipelines-templates/run-unit-tests.yml@templates
        parameters:
          runUnitTests: true
          unitTestRunsettings: '$(System.DefaultWorkingDirectory)\nf-interpreter\targets\netcore\pipeline_tests.runsettings'
          packagesDirectory: "$(Build.SourcesDirectory)/CoreLibrary/packages"

      - task: CopyFiles@2
        condition: succeededOrFailed()
        displayName: Copy vstest dump files
        inputs:
          SourceFolder: 'D:\a\_temp\'
          Contents: "**/*.dmp"
          TargetFolder: "$(Build.ArtifactStagingDirectory)/vstest_dumps"
          flattenFolders: true

      - powershell: |
          $dumpPath = "$(Build.ArtifactStagingDirectory)/vstest_dumps"
          $hasFiles = $false

          if (Test-Path $dumpPath -PathType Container) {
              $fileCount = (Get-ChildItem $dumpPath -File | Measure-Object).Count
              $hasFiles = $fileCount -gt 0
          }
          echo "##vso[task.setvariable variable=hasFiles;isOutput=true]$hasFiles"
        displayName: "Check for dump files"
        name: checkFiles

      - task: PublishPipelineArtifact@1
        condition: eq(variables['hasFiles'], 'true')
        displayName: Publish vstest dump files
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)/vstest_dumps"
          artifactName: VsTestCrashDumps
          artifactType: pipeline

