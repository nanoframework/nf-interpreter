          $packageVersion = "1.0.$(HelperPackageVersion)"
          Write-Host "Packing validation managed helpers from $nuspec as $packageVersion"
          & nuget pack $nuspec -Version $packageVersion -OutputDirectory $outDir
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Write-Host "##vso[task.setvariable variable=HAS_MANAGED_HELPERS]true"
        condition: succeeded()
