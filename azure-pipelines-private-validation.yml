# Private validation pipeline for full nanoCLR build/package flow.
# Runs only when manually started in Azure DevOps.
trigger: none
pr: none

variables:
  BUILD_ALL__: "true"
  BUILD_CHIBIOS__: "false"
  BUILD_FREERTOS__: "false"
  BUILD_ESP32__: "false"
  BUILD_NXP__: "false"
  BUILD_TI__: "false"
  BUILD_THREADX__: "false"
  BUILD_WINDOWS_NANOCLR__: "false"
  BUILD_POSIX__: "false"
  BUILD_NANOCLR_CLI__: "false"
  RUN_MSCORLIB_TESTS__: "false"
  StartReleaseCandidate: "false"

# add nf-tools repo to resources (for Azure Pipelines templates)
resources:
  repositories:
    - repository: templates
      type: github
      name: nanoframework/nf-tools
      endpoint: nanoframework
    - repository: esp32_idf
      type: github
      name: espressif/esp-idf
      endpoint: nanoframework
      ref: refs/tags/v5.5.4
    - repository: mscorlib
      type: github
      name: nanoframework/CoreLibrary
      endpoint: nanoframework
    - repository: littlefs
      type: github
      name: littlefs-project/littlefs
      endpoint: nanoframework
      ref: refs/tags/v2.11.2

jobs:
  ##############################
  - job: Check_Build_Options
    pool:
      vmImage: "windows-2022"

    variables:
      DOTNET_NOLOGO: true

    steps:
      - checkout: self
        fetchDepth: 1

      - powershell: |
          echo "##vso[task.setvariable variable=RUN_MSCORLIB_TESTS;isOutput=true]$(RUN_MSCORLIB_TESTS__)"

          if($env:StartReleaseCandidate -like "true")
          {
            echo "##vso[task.setvariable variable=SKIP_BUILD;isOutput=true]true"
            Write-Host "##[command] Release preparation is disabled in private validation, skipping build."
          }
          else
          {
            echo "##vso[task.setvariable variable=SKIP_BUILD;isOutput=true]false"
            Write-Host "##[command] Private validation build."
          }

        name: BuildOptions
        displayName: Get build options

      - powershell: |
          function Test-Enabled($value) {
            return $value -like "true"
          }

          if($env:StartReleaseCandidate -like "true")
          {
            Write-Host "##[command] Release preparation is disabled in private validation."
          }
          else
          {
            $buildAll = Test-Enabled "$(BUILD_ALL__)"
            $targets = @{
              BUILD_ALL = $buildAll
              BUILD_CHIBIOS = ($buildAll -or (Test-Enabled "$(BUILD_CHIBIOS__)"))
              BUILD_FREERTOS = ($buildAll -or (Test-Enabled "$(BUILD_FREERTOS__)") -or (Test-Enabled "$(BUILD_NXP__)"))
              BUILD_ESP32 = ($buildAll -or (Test-Enabled "$(BUILD_ESP32__)"))
              BUILD_TI = ($buildAll -or (Test-Enabled "$(BUILD_TI__)"))
              BUILD_THREADX = ($buildAll -or (Test-Enabled "$(BUILD_THREADX__)"))
              BUILD_WIN32 = ($buildAll -or (Test-Enabled "$(BUILD_WINDOWS_NANOCLR__)"))
              BUILD_POSIX = ($buildAll -or (Test-Enabled "$(BUILD_POSIX__)") -or (Test-Enabled "$(BUILD_NANOCLR_CLI__)"))
              BUILD_NANOCLR_CLI = ($buildAll -or (Test-Enabled "$(BUILD_NANOCLR_CLI__)"))
            }

            foreach ($target in $targets.GetEnumerator()) {
              $value = $target.Value.ToString().ToLowerInvariant()
              echo "##vso[task.setvariable variable=$($target.Key);isOutput=true]$value"
              Write-Host "##[command] $($target.Key)=$value"
            }
          }

        name: TargetsToBuild
        displayName: Get targets to build

  ##############################
  - job: Check_Code_Style
    condition: >-
      and(
        ne(dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true),
        or(
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_CHIBIOS'], true),
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ESP32'], true),
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_FREERTOS'], true),
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_TI'], true),
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_THREADX'], true),
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_WIN32'], true),
          eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_POSIX'], true)
        )
      )

    dependsOn:
      - Check_Build_Options

    pool:
      vmImage: "ubuntu-latest"

    steps:
      - checkout: self
        fetchDepth: 1
        condition: ne(variables['System.PullRequest.PullRequestId'], '')

      - template: azure-pipelines-templates/download-install-llvm.yml
      - template: azure-pipelines-templates/check-code-style.yml

  ###############
  # STM32
  - job: Build_STM32_targets
    condition: >-
      or(
        and(
          succeeded('Check_Code_Style'),
          ne( dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true ),
          or(
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_CHIBIOS'], true)
          )
        ),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq(variables['BUILD_ALL__'], 'true'),
            eq(variables['BUILD_CHIBIOS__'], 'true')
          )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style

    pool:
      vmImage: "ubuntu-latest"

    strategy:
      matrix:
        ST_STM32F429I_DISCOVERY:
          TargetBoard: ST_STM32F429I_DISCOVERY
          TargetSeries: "stm32f4xx"
          BuildOptions:
          NeedsDFU: false
          NeedsSRECORD: false
          CMakePreset: ST_STM32F429I_DISCOVERY

        ST_STM32F769I_DISCOVERY:
          TargetBoard: ST_STM32F769I_DISCOVERY
          TargetSeries: "stm32f7xx"
          BuildOptions:
          NeedsDFU: false
          NeedsSRECORD: true
          CMakePreset: ST_STM32F769I_DISCOVERY

    variables:
      DOTNET_NOLOGO: true
      # creates a counter and assigns it to the revision variable
      REVISION: $[counter('STM32_1_17_0_versioncounter', 0)]
      HelperPackageVersion: $[counter('HelperPackageVersioncounter', 0)]
      TargetPlatform: "stm32"

    steps:
      - template: azure-pipelines-templates/build-preparations.yml
      - template: azure-pipelines-templates/nb-gitversioning.yml
      - template: azure-pipelines-templates/download-install-arm-gcc-toolchain.yml
      - template: azure-pipelines-templates/download-srecord.yml
      - template: azure-pipelines-templates/download-hexdfu.yml
      - template: azure-pipelines-templates/install-kconfig-tools.yml
      - template: azure-pipelines-templates/validate-kconfig.yml
        parameters:
          targetPreset: $(CMakePreset)
      - template: azure-pipelines-templates/build-chibios-stm32-targets.yml
      - template: azure-pipelines-templates/pack-publish-artifacts.yml
      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish validation target artifacts
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: '$(TargetPublishName)_validation'
          artifactType: pipeline
      - task: NuGetToolInstaller@1
        condition: succeeded()
        displayName: Install NuGet for validation managed helpers

      - pwsh: |
          $sourceRoot = "$(Build.SourcesDirectory)"
          $nestedRepo = Join-Path $sourceRoot "nf-interpreter"
          if (Test-Path $nestedRepo) {
            $sourceRoot = $nestedRepo
          }

          $candidates = @(
            "targets/ChibiOS/$(TargetBoard)/managed_helpers/package.nuspec",
            "targets/ThreadX/ST/$(TargetBoard)/managed_helpers/package.nuspec"
          )

          $nuspec = $null
          foreach ($candidate in $candidates) {
            $candidatePath = Join-Path $sourceRoot $candidate
            if (Test-Path $candidatePath) {
              $nuspec = $candidatePath
              break
            }
          }

          if (-not $nuspec) {
            Write-Host "No managed helper package found for $(TargetBoard)."
            exit 0
          }

          $outDir = "$(Build.ArtifactStagingDirectory)/managed-helpers"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          $packageVersion = "1.0.$(HelperPackageVersion)"
          Write-Host "Packing validation managed helpers from $nuspec as $packageVersion"
          & nuget pack $nuspec -Version $packageVersion -OutputDirectory $outDir
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Write-Host "##vso[task.setvariable variable=HAS_MANAGED_HELPERS]true"
        condition: succeeded()
        displayName: Pack validation managed helpers

      - task: PublishPipelineArtifact@1
        condition: and(succeeded(), eq(variables['HAS_MANAGED_HELPERS'], 'true'))
        displayName: Publish validation managed helpers
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)/managed-helpers"
          artifactName: "$(TargetPublishName)_managed_helpers_validation"
          artifactType: pipeline
  ######################
  # ChibiOS RP targets
  - job: Build_ChibiOS_RP_targets
    condition: >-
      or(
        and(
          succeeded('Check_Code_Style'),
          ne( dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true ),
          or(
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_CHIBIOS'], true)
          )
        ),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq(variables['BUILD_ALL__'], 'true'),
            eq(variables['BUILD_CHIBIOS__'], 'true')
          )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style

    pool:
      vmImage: "ubuntu-latest"

    strategy:
      matrix:
        RP_PICO_RP2040:
          TargetBoard: RP_PICO_RP2040
          TargetSeries: "RP2040"
          BuildOptions:
          CMakePreset: RP_PICO_RP2040
        RP_PICO_W_RP2040:
          TargetBoard: RP_PICO_W_RP2040
          TargetSeries: "RP2040"
          BuildOptions:
          CMakePreset: RP_PICO_W_RP2040
        RP_PICO2_RP2350:
          TargetBoard: RP_PICO2_RP2350
          TargetSeries: "RP2350"
          BuildOptions:
          CMakePreset: RP_PICO2_RP2350

    variables:
      DOTNET_NOLOGO: true
      # creates a counter and assigns it to the revision variable
      REVISION: $[counter('RP_1_17_0_versioncounter', 0)]
      HelperPackageVersion: $[counter('HelperPackageVersioncounter', 0)]
      TargetPlatform: "rp"

    steps:
      - template: azure-pipelines-templates/build-preparations.yml
      - template: azure-pipelines-templates/nb-gitversioning.yml
      - template: azure-pipelines-templates/download-install-arm-gcc-toolchain.yml
      - template: azure-pipelines-templates/install-kconfig-tools.yml
      - template: azure-pipelines-templates/validate-kconfig.yml
        parameters:
          targetPreset: $(CMakePreset)
      - template: azure-pipelines-templates/build-chibios-rp-targets.yml
      - template: azure-pipelines-templates/pack-publish-artifacts.yml
      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish validation target artifacts
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: '$(TargetPublishName)_validation'
          artifactType: pipeline

  #################
  # ESP32 targets
  - job: Build_ESP32_targets
    condition: >-
      or(
        and(
          succeeded('Check_Code_Style'),
          ne( dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true ),
          or(
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ESP32'], true)
          )
        ),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq(variables['BUILD_ALL__'], 'true'),
            eq(variables['BUILD_ESP32__'], 'true')
          )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style

    pool:
      vmImage: "ubuntu-latest"

    # there is only a single ESP32 target, but this is already config as a matrix to make it easy to add new ones
    strategy:
      matrix:
        ESP32_PSRAM_REV0:
          TargetBoard: ESP32
          TargetSeries: "esp32"
          BuildOptions:
          IDF_Target: esp32
          TargetName: ESP32
          PackageName: ESP32_PSRAM_REV0
          CMakePreset: ESP32_PSRAM_REV0

        ESP32_BLE_REV0:
          TargetBoard: ESP32
          TargetSeries: "esp32"
          BuildOptions:
          IDF_Target: esp32
          TargetName: ESP32
          PackageName: ESP32_BLE_REV0
          CMakePreset: ESP32_BLE_REV0

        ESP32_C3:
          TargetBoard: ESP32_C3
          TargetSeries: "esp32c3"
          BuildOptions:
          IDF_Target: esp32c3
          TargetName: ESP32_C3
          PackageName: ESP32_C3
          CMakePreset: ESP32_C3

        ESP32_C5_THREAD:
          TargetBoard: ESP32_C5
          TargetSeries: "esp32c5"
          BuildOptions:
          IDF_Target: esp32c5
          TargetName: ESP32_C5_THREAD
          PackageName: ESP32_C5_THREAD
          CMakePreset: ESP32_C5_THREAD

        ESP32_C6_THREAD:
          TargetBoard: ESP32_C6
          TargetSeries: "esp32c6"
          BuildOptions:
          IDF_Target: esp32c6
          TargetName: ESP32_C6_THREAD
          PackageName: ESP32_C6_THREAD
          CMakePreset: ESP32_C6_THREAD

        ESP32_C61:
          TargetBoard: ESP32_C61
          TargetSeries: "esp32c61"
          BuildOptions:
          IDF_Target: esp32c61
          TargetName: ESP32_C61
          PackageName: ESP32_C61
          CMakePreset: ESP32_C61

        ESP32_H2_THREAD:
          TargetBoard: ESP32_H2
          TargetSeries: "esp32h2"
          BuildOptions:
          IDF_Target: esp32h2
          TargetName: ESP32_H2_THREAD
          PackageName: ESP32_H2_THREAD
          CMakePreset: ESP32_H2_THREAD

        ESP32_S3_QUAD:
          TargetBoard: ESP32_S3
          TargetSeries: "esp32s3"
          BuildOptions:
          IDF_Target: esp32s3
          TargetName: ESP32_S3_QUADL
          PackageName: ESP32_S3_QUAD
          CMakePreset: ESP32_S3_QUAD

        ESP32_S3_OCTAL:
          TargetBoard: ESP32_S3
          TargetSeries: "esp32s3"
          BuildOptions:
          IDF_Target: esp32s3
          TargetName: ESP32_S3_OCTAL
          PackageName: ESP32_S3_OCTAL
          CMakePreset: ESP32_S3_OCTAL

        ESP32_P4_REV_LESS3:
          TargetBoard: ESP32_P4
          TargetSeries: "esp32p4"
          BuildOptions:
          IDF_Target: esp32p4
          TargetName: ESP32_P4_REV_LESS3
          PackageName: ESP32_P4_REV_LESS3
          CMakePreset: ESP32_P4_REV_LESS3

    variables:
      DOTNET_NOLOGO: true
      # creates a counter and assigns it to the revision variable
      REVISION: $[counter('ESP32_1_17_0_versioncounter', 0)]
      IDF_PATH: "$(Agent.BuildDirectory)/s/esp-idf"
      PIP_CACHE_DIR: $(Pipeline.Workspace)/.pip
      TargetPlatform: "esp32"
      IDF_TAG: "v5.5.4"

    steps:
      - checkout: self
        path: s/nf-interpreter

      - template: azure-pipelines-templates/checkout-idf.yml
        parameters:
          repoDirectory: '$(Agent.BuildDirectory)/s'
      - template: azure-pipelines-templates/build-preparations.yml
        parameters:
          repoDirectory: '$(Agent.BuildDirectory)/s/nf-interpreter'
      - template: azure-pipelines-templates/nb-gitversioning.yml
        parameters:
          repoDirectory: '$(Agent.BuildDirectory)/s/nf-interpreter'
      - template: azure-pipelines-templates/download-install-esp32-build-components.yml
      - template: azure-pipelines-templates/build-espressif-esp32-targets.yml
        parameters:
          repoDirectory: '$(Agent.BuildDirectory)/s/nf-interpreter'
          partitionsDirectory: '$(Agent.BuildDirectory)/s/nf-interpreter/targets/ESP32/_IDF/$(IDF_Target)'
      - task: CopyFiles@2
        condition: succeeded()
        displayName: Copying bootloader
        inputs:
          sourceFolder: '$(Agent.BuildDirectory)/s/nf-interpreter/build/bootloader'
          Contents: |
            bootloader.bin
          TargetFolder: '$(Build.ArtifactStagingDirectory)/$(TargetPublishName)'
          flattenFolders: true
          ignoreMakeDirErrors: true

      - template: azure-pipelines-templates/copy-sdkconfig.yml
        parameters:
          repoDirectory: '$(Agent.BuildDirectory)/s/nf-interpreter'
      - template: azure-pipelines-templates/pack-publish-artifacts.yml
        parameters:
          buildDirectory: '$(Agent.BuildDirectory)/s/nf-interpreter/build'
      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish validation target artifacts
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: '$(TargetPublishName)_validation'
          artifactType: pipeline
      - template: azure-pipelines-templates/publish-sdkconfig.yml

  #################
  # NXP
  - job: Build_NXP_targets
    condition: >-
      or(
        and(
          succeeded('Check_Code_Style'),
          ne( dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true ),
          or(
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_FREERTOS'], true)
          )
        ),
        and(
          eq(variables['Build.Reason'], 'Manual'),
          or(
            eq(variables['BUILD_ALL__'], 'true'),
            eq(variables['BUILD_NXP__'], 'true')
          )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style

    pool:
      vmImage: "ubuntu-latest"

    strategy:
      matrix:
        NXP_MIMXRT1060_EVK:
          TargetBoard: NXP_MIMXRT1060_EVK
          TargetSeries: "imxrt10xx"
          BuildOptions:
          NeedsSRECORD: true
          CMakePreset: NXP_MIMXRT1060_EVK

    variables:
      DOTNET_NOLOGO: true
      # creates a counter and assigns it to the revision variable
      REVISION: $[counter('NXP_1_17_0_versioncounter', 0)]
      GIT_LFS_SKIP_SMUDGE: 1
      TargetPlatform: "freertos"

    steps:
      - template: azure-pipelines-templates/build-preparations.yml
      - template: azure-pipelines-templates/nb-gitversioning.yml
      - template: azure-pipelines-templates/download-install-arm-gcc-toolchain.yml
      - template: azure-pipelines-templates/download-srecord.yml
      - template: azure-pipelines-templates/install-kconfig-tools.yml
      - template: azure-pipelines-templates/validate-kconfig.yml
        parameters:
          targetPreset: $(CMakePreset)
      - template: azure-pipelines-templates/build-freertos-nxp-targets.yml
      - template: azure-pipelines-templates/pack-publish-artifacts.yml
      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish validation target artifacts
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: '$(TargetPublishName)_validation'
          artifactType: pipeline
      - task: NuGetToolInstaller@1
        condition: succeeded()
        displayName: Install NuGet for validation managed helpers

      - pwsh: |
          $sourceRoot = "$(Build.SourcesDirectory)"
          $nestedRepo = Join-Path $sourceRoot "nf-interpreter"
          if (Test-Path $nestedRepo) {
            $sourceRoot = $nestedRepo
          }

          $candidates = @(
            "targets/ChibiOS/$(TargetBoard)/managed_helpers/package.nuspec",
            "targets/ThreadX/ST/$(TargetBoard)/managed_helpers/package.nuspec"
          )

          $nuspec = $null
          foreach ($candidate in $candidates) {
            $candidatePath = Join-Path $sourceRoot $candidate
            if (Test-Path $candidatePath) {
              $nuspec = $candidatePath
              break
            }
          }

          if (-not $nuspec) {
            Write-Host "No managed helper package found for $(TargetBoard)."
            exit 0
          }

          $outDir = "$(Build.ArtifactStagingDirectory)/managed-helpers"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          $packageVersion = "1.0.$(HelperPackageVersion)"
          Write-Host "Packing validation managed helpers from $nuspec as $packageVersion"
          & nuget pack $nuspec -Version $packageVersion -OutputDirectory $outDir
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Write-Host "##vso[task.setvariable variable=HAS_MANAGED_HELPERS]true"
        condition: succeeded()
        displayName: Pack validation managed helpers

      - task: PublishPipelineArtifact@1
        condition: and(succeeded(), eq(variables['HAS_MANAGED_HELPERS'], 'true'))
        displayName: Publish validation managed helpers
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)/managed-helpers"
          artifactName: "$(TargetPublishName)_managed_helpers_validation"
          artifactType: pipeline
  #################
  # TI SimpleLink
  - job: Build_TI_SimpleLink_targets
    condition: >-
      or(
        and(
          succeeded('Check_Code_Style'),
          ne( dependencies.Check_Build_Options.outputs['BuildOptions.SKIP_BUILD'], true ),
          or(
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_ALL'], true),
            eq(dependencies.Check_Build_Options.outputs['TargetsToBuild.BUILD_TI'], true)
          )
        ),
        and(
            eq(variables['Build.Reason'], 'Manual'),
            or(
              eq(variables['BUILD_ALL__'], 'true'),
              eq(variables['BUILD_TI__'], 'true')
            )
        )
      )

    dependsOn:
      - Check_Build_Options
      - Check_Code_Style

    pool:
      vmImage: "ubuntu-latest"

    strategy:
      matrix:
        # disabled: waiting to update SDK to latest version with Sys Config
        # TI_CC3220SF_LAUNCHXL:
        #   TargetBoard: TI_CC3220SF_LAUNCHXL
        #   TargetSeries: 'cc32xx'
        #   BuildOptions: >-
        #  -DTARGET_SERIES=CC32xx
        #  -DRTOS=TI_SimpleLink
        #  -DNF_SUPPORT_ANY_BASE_CONVERSION=OFF
        #  -DNF_FEATURE_DEBUGGER=ON
        #  -DNF_FEATURE_RTC=ON
        #  -DNF_FEATURE_WATCHDOG=OFF
        #  -DNF_FEATURE_HAS_CONFIG_BLOCK=ON
        #  -DAPI_System.Device.Gpio=ON
        #  -DAPI_System.Device.Spi=ON
        #  -DAPI_System.Device.I2c=ON
        #  -DAPI_System.Device.Pwm=ON
        #  -DAPI_System.Device.Adc=ON
        #  -DAPI_System.Net=ON
        #  -DAPI_nanoFramework.System.Collections=ON
        #  -DAPI_nanoFramework.System.Text=ON

        TI_CC1352R1_LAUNCHXL_915:
          TargetBoard: TI_CC1352R1_LAUNCHXL
          PackageName: TI_CC1352R1_LAUNCHXL_915
          TargetSeries: "CC13X2"
          BuildOptions: >-
            -DTI_SIMPLELINK_RADIO_FREQ_MHZ=915
          CMakePreset: TI_CC1352R1_LAUNCHXL

    variables:
      DOTNET_NOLOGO: true
      # creates a counter and assigns it to the revision variable
      REVISION: $[counter('TI_1_17_0_versioncounter', 0)]
      HelperPackageVersion: $[counter('HelperPackageVersioncounter', 0)]
      TargetPlatform: "ti_simplelink"

    steps:
      - template: azure-pipelines-templates/build-preparations.yml
      - template: azure-pipelines-templates/nb-gitversioning.yml
      - template: azure-pipelines-templates/download-install-arm-gcc-toolchain.yml
      - template: azure-pipelines-templates/install-kconfig-tools.yml
      - template: azure-pipelines-templates/validate-kconfig.yml
        parameters:
          targetPreset: $(CMakePreset)
      - template: azure-pipelines-templates/build-ti-simplelink-targets.yml
      - template: azure-pipelines-templates/pack-publish-artifacts.yml
      - task: PublishPipelineArtifact@1
        condition: succeeded()
        displayName: Publish validation target artifacts
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: '$(TargetPublishName)_validation'
          artifactType: pipeline
      - task: NuGetToolInstaller@1
        condition: succeeded()
        displayName: Install NuGet for validation managed helpers

      - pwsh: |
          $sourceRoot = "$(Build.SourcesDirectory)"
          $nestedRepo = Join-Path $sourceRoot "nf-interpreter"
          if (Test-Path $nestedRepo) {
            $sourceRoot = $nestedRepo
          }

          $nuspec = Join-Path $sourceRoot "targets/TI_SimpleLink/$(TargetBoard)/managed_helpers/package.nuspec"
          if (-not (Test-Path $nuspec)) {
            Write-Host "No managed helper package found for $(TargetBoard)."
