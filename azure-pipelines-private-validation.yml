          platform: "x86"
          maximumCpuCount: true
          msbuildArgs: "/p:PublicRelease=true"
          configuration: "Release"

      - task: VSBuild@1
        displayName: Build WIN DLL target
        inputs:
          solution: "nf-interpreter/targets/netcore/nanoCLR.sln"
          platform: "Any CPU"
          maximumCpuCount: true
          msbuildArgs: "/restore /p:PublicRelease=true /p:BuildWithNetFrameworkHostedCompiler=true"
          configuration: "Release"

      - task: CopyFiles@2
        condition: succeeded()
        displayName: Stage win-x64 nanoCLR runtime artifact
        inputs:
          SourceFolder: "$(Build.SourcesDirectory)/nf-interpreter/build/bin/Release"
          Contents: "nanoFramework.nanoCLR.dll"
          TargetFolder: "$(Build.ArtifactStagingDirectory)/runtimes/win-x64/native"
